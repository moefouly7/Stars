<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نجوم السما</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(to bottom, #8b0000, #ffb6c1); /* سماء حمراء إلى وردي */
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
        }
        .floating-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .floating-item {
            position: absolute;
            animation: floatUp linear infinite;
            opacity: 0.6;
        }
        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg); }
            100% { transform: translateY(-10vh) rotate(360deg); }
        }
        .star {
            position: absolute;
            font-size: 2rem;
            cursor: pointer;
            z-index: 10;
            text-shadow: 0 0 15px #fff, 0 0 20px gold;
            animation: twinkle 1.5s infinite alternate;
            transition: transform 0.2s;
        }
        .star:hover {
            transform: scale(1.5);
        }
        @keyframes twinkle {
            0% { opacity: 0.4; text-shadow: 0 0 5px #fff; }
            100% { opacity: 1; text-shadow: 0 0 20px #fff, 0 0 30px gold; }
        }
        #message-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: rgba(255, 255, 255, 0.95);
            padding: 20px 40px;
            border-radius: 25px;
            border: 3px solid #ff1493;
            box-shadow: 0 0 30px rgba(255, 20, 147, 0.6);
            font-size: 2.5rem;
            font-weight: bold;
            color: #8b0000;
            text-align: center;
            z-index: 20;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }
        #message-box.show {
            transform: translate(-50%, -50%) scale(1);
        }
    </style>
</head>
<body>

    <div class="floating-bg" id="bg-container"></div>
    <div id="stars-container"></div>
    <div id="message-box"></div>

    <script>
        const phrases = [
            "بحبك", "ضحكتك", "شجاعتك", "حنانك عليا", 
            "اهتمامك بيا", "فهمك ليا", "حلوة في كل الأوقات", 
            "عنادك", "عصبيتك", "طريقة كلامك", "هدوئك", "باندتي 🐼"
        ];

        const bgContainer = document.getElementById('bg-container');
        const starsContainer = document.getElementById('stars-container');
        const messageBox = document.getElementById('message-box');

        // إنشاء القلوب والباندا العائمة في الخلفية
        const items = ['❤️', '🐼', '💖', '🐼', '💕'];
        for (let i = 0; i < 40; i++) {
            let el = document.createElement('div');
            el.className = 'floating-item';
            el.innerText = items[Math.floor(Math.random() * items.length)];
            el.style.left = Math.random() * 100 + 'vw';
            el.style.animationDuration = (Math.random() * 15 + 8) + 's'; // سرعات مختلفة
            el.style.animationDelay = Math.random() * 5 + 's';
            el.style.fontSize = (Math.random() * 2 + 1) + 'rem';
            bgContainer.appendChild(el);
        }

        // توزيع النجوم بشكل عشوائي وربطها بالكلمات
        phrases.forEach((phrase) => {
            let star = document.createElement('div');
            star.className = 'star';
            star.innerText = '✨'; 
            
            // توزيع في الشاشة مع إبعادهم عن الحواف
            star.style.left = (Math.random() * 80 + 10) + 'vw';
            star.style.top = (Math.random() * 80 + 10) + 'vh';
            star.style.animationDelay = Math.random() * 2 + 's';

            star.addEventListener('click', () => {
                messageBox.innerText = phrase;
                messageBox.classList.remove('show');
                // ريستارت للأنيميشن
                void messageBox.offsetWidth;
                messageBox.classList.add('show');
                
                // إخفاء الرسالة بعد 3 ثواني
                setTimeout(() => {
                    messageBox.classList.remove('show');
                }, 3000);
            });

            starsContainer.appendChild(star);
        });
    </script>
</body>
</html>
