<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نجوم الحب</title>

<style>

body{
margin:0;
height:100vh;
overflow:hidden;
font-family:sans-serif;
background:linear-gradient(180deg,#ff6b8f,#c4003a);
position:relative;
}

.star{
position:absolute;
font-size:32px;
cursor:pointer;
transition:.2s;
}

.star:hover{
transform:scale(1.3);
}

canvas{
position:absolute;
top:0;
left:0;
pointer-events:none;
}

/* صندوق الرسالة */

.message{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(.8);
background:#ffd1e4;
padding:25px 45px;
border-radius:25px;
font-size:26px;
color:#a1003c;
box-shadow:0 10px 30px rgba(0,0,0,.3);
display:none;
text-align:center;
animation:pop .6s ease;
}

@keyframes pop{
from{transform:translate(-50%,-50%) scale(.5);opacity:0}
to{transform:translate(-50%,-50%) scale(1);opacity:1}
}

/* انفجار القلوب */

.burst-heart{
position:absolute;
font-size:22px;
pointer-events:none;
animation:burst 1s ease-out forwards;
}

@keyframes burst{
0%{
transform:translate(0,0) scale(1);
opacity:1;
}
100%{
transform:translate(var(--x),var(--y)) scale(.4);
opacity:0;
}
}

</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div id="sky"></div>
<div id="message" class="message"></div>

<script>

const words=[
"بحبك",
"ضحكتك",
"شجاعتك",
"حنانك عليا",
"اهتمامك بيا",
"فهمك ليا",
"حلوة في كل الأوقات",
"عنادك",
"عصبيتك",
"طريقة كلامك",
"هدوئك",
"باندتي"
]

const heartShape=[
[50,10],[65,20],[80,35],[85,55],[75,70],[60,85],
[50,92],[40,85],[25,70],[15,55],[20,35],[35,20]
]

const sky=document.getElementById("sky")
const msg=document.getElementById("message")

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let clicked=0
let points=[]

/* انفجار القلوب */

function heartExplosion(x,y){

for(let i=0;i<40;i++){

const h=document.createElement("div")
h.className="burst-heart"
h.innerHTML="❤️"

h.style.left=x+"px"
h.style.top=y+"px"

const dx=(Math.random()*500-250)+"px"
const dy=(Math.random()*500-250)+"px"

h.style.setProperty("--x",dx)
h.style.setProperty("--y",dy)

document.body.appendChild(h)

setTimeout(()=>h.remove(),1000)

}

}

/* إنشاء النجوم */

heartShape.forEach((p,i)=>{

const star=document.createElement("div")
star.className="star"
star.innerHTML="⭐"

const x=(p[0]/100)*window.innerWidth
const y=(p[1]/100)*window.innerHeight

star.style.left=x+"px"
star.style.top=y+"px"

star.onclick=()=>{

if(star.classList.contains("done")) return

star.classList.add("done")

msg.innerText=words[i]
msg.style.display="block"

points.push({x:x+15,y:y+15})

if(points.length>1){

ctx.strokeStyle="#ffd6ea"
ctx.lineWidth=3

ctx.beginPath()
ctx.moveTo(points[points.length-2].x,points[points.length-2].y)
ctx.lineTo(points[points.length-1].x,points[points.length-1].y)
ctx.stroke()

}

clicked++

if(clicked===12){

heartExplosion(window.innerWidth/2,window.innerHeight/2)

setTimeout(()=>{
msg.innerHTML="❤️ .. <br><br> أنا بحبك في كل تفاصيلك ❤️"
msg.style.display="block"
},900)

}

}

sky.appendChild(star)

})

</script>

</body>
</html>
