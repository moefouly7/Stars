<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نجوم الحب</title>

<style>

body{
margin:0;
height:100vh;
overflow:hidden;
font-family:sans-serif;
background:linear-gradient(180deg,#ff6b8f,#c4003a);
position:relative;
}

/* النجوم */

.star{
position:absolute;
font-size:30px;
cursor:pointer;
transition:.2s;
}

.star:hover{
transform:scale(1.3);
}

/* خطوط النجوم */

canvas{
position:absolute;
top:0;
left:0;
pointer-events:none;
}

/* الرسالة */

.message{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#ffd1e4;
padding:25px 45px;
border-radius:25px;
font-size:24px;
color:#a1003c;
box-shadow:0 10px 25px rgba(0,0,0,.2);
display:none;
text-align:center;
}

/* القلوب */

.heart{
position:absolute;
font-size:20px;
opacity:.6;
animation:float 6s linear infinite;
}

@keyframes float{
from{transform:translateY(100vh)}
to{transform:translateY(-10vh)}
}

/* الباندا */

.panda{
position:absolute;
font-size:34px;
opacity:.9;
}

</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div id="sky"></div>
<div id="message" class="message"></div>

<script>

const words=[
"بحبك",
"ضحكتك",
"شجاعتك",
"حنانك عليا",
"اهتمامك بيا",
"فهمك ليا",
"حلوة في كل الأوقات",
"عنادك",
"عصبيتك",
"طريقة كلامك",
"هدوئك",
"باندتي"
]

const heartShape=[
[50,10],[65,20],[80,35],[85,55],[75,70],[60,85],
[50,92],[40,85],[25,70],[15,55],[20,35],[35,20]
]

const sky=document.getElementById("sky")
const msg=document.getElementById("message")

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let clicked=0
let points=[]

heartShape.forEach((p,i)=>{

const star=document.createElement("div")
star.className="star"
star.innerHTML="⭐"

const x=(p[0]/100)*window.innerWidth
const y=(p[1]/100)*window.innerHeight

star.style.left=x+"px"
star.style.top=y+"px"

star.onclick=()=>{

if(star.classList.contains("done")) return

star.classList.add("done")

msg.innerText=words[i]
msg.style.display="block"

points.push({x:x+15,y:y+15})

if(points.length>1){

ctx.strokeStyle="#ffd6ea"
ctx.lineWidth=3

ctx.beginPath()
ctx.moveTo(points[points.length-2].x,points[points.length-2].y)
ctx.lineTo(points[points.length-1].x,points[points.length-1].y)
ctx.stroke()

}

clicked++

if(clicked===12){

setTimeout(()=>{
msg.innerHTML="✨ اكتشفتي كل النجوم… <br><br> أنا بحبك في كل تفاصيلك ❤️"
},500)

}

}

sky.appendChild(star)

})

/* قلوب متحركة */

for(let i=0;i<20;i++){

const h=document.createElement("div")
h.className="heart"
h.innerHTML="❤️"

h.style.left=Math.random()*100+"vw"
h.style.animationDuration=(4+Math.random()*4)+"s"

document.body.appendChild(h)

}

/* باندا في الأطراف فقط */

const pandaPositions=[
[5,10],[90,15],[10,80],[85,85],[50,5],[50,95]
]

pandaPositions.forEach(p=>{

const panda=document.createElement("div")
panda.className="panda"
panda.innerHTML="🐼"

panda.style.left=p[0]+"vw"
panda.style.top=p[1]+"vh"

document.body.appendChild(panda)

})

</script>

</body>
</html>
